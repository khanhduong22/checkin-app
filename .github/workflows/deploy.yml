name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Tests
        run: npm run test

      - name: Build Check
        run: npm run build

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,NEXTAUTH_URL,NEXTAUTH_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GEMINI_API_KEY,GOOGLE_GENERATIVE_AI_API_KEY,RESEND_API_KEY,EMAIL_FROM
          script: |
            cd /opt/checkin-app
            
            # Stash any local modifications to prevent conflicts
            git stash
            
            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            
            # Re-generate .env file from GitHub Actions secrets
            cat << EOF > .env
            DATABASE_URL="$DATABASE_URL"
            NEXTAUTH_URL="$NEXTAUTH_URL"
            NEXTAUTH_SECRET="$NEXTAUTH_SECRET"
            GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"
            NODE_ENV="production"
            GEMINI_API_KEY="$GEMINI_API_KEY"
            GOOGLE_GENERATIVE_AI_API_KEY="$GOOGLE_GENERATIVE_AI_API_KEY"
            RESEND_API_KEY="$RESEND_API_KEY"
            EMAIL_FROM="$EMAIL_FROM"
            PORT=3000
            EOF
            
            # Build and deploy with docker-compose
            docker compose up -d --build
            
            # Sync database schema using prisma db push
            docker compose exec -T checkin-app npx prisma@5.9.1 db push --skip-generate

            # Gather diagnostics on the VPS host
            DIAG_FILE="/tmp/vps-diag.txt"
            echo "=== VPS HOST DIAGNOSTICS ===" > \$DIAG_FILE
            echo "Timestamp: \$(date)" >> \$DIAG_FILE
            echo "" >> \$DIAG_FILE

            # Make sync script executable and run it
            chmod +x /opt/checkin-app/scripts/sync-db.sh

            echo "=== Checking Sync Script ===" >> \$DIAG_FILE
            if [ -f /opt/checkin-app/scripts/sync-db.sh ]; then
              cat /opt/checkin-app/scripts/sync-db.sh >> \$DIAG_FILE
              echo "" >> \$DIAG_FILE
              echo "=== Executing Sync Script ===" >> \$DIAG_FILE
              bash /opt/checkin-app/scripts/sync-db.sh >> \$DIAG_FILE 2>&1
            else
              echo "sync-db.sh not found at /opt/checkin-app/scripts/sync-db.sh" >> \$DIAG_FILE
            fi
            echo "" >> \$DIAG_FILE

            echo "=== Checking Cron Jobs ===" >> \$DIAG_FILE
            crontab -l >> \$DIAG_FILE 2>&1 || echo "No crontab for current user" >> \$DIAG_FILE
            echo "" >> \$DIAG_FILE

            echo "=== Checking Cron Logs ===" >> \$DIAG_FILE
            tail -n 50 /var/log/cron >> \$DIAG_FILE 2>&1 || journalctl -u cron -n 50 >> \$DIAG_FILE 2>&1 || echo "Cannot read cron logs" >> \$DIAG_FILE
            echo "" >> \$DIAG_FILE

            echo "=== VPS Database Tasks Query ===" >> \$DIAG_FILE
            echo "Total tasks count:" >> \$DIAG_FILE
            docker exec -t checkin-db psql -U kido -d checkin_db -c "SELECT COUNT(*) FROM \"StaffTask\";" >> \$DIAG_FILE 2>&1
            echo "Tasks count for Thư:" >> \$DIAG_FILE
            docker exec -t checkin-db psql -U kido -d checkin_db -c "SELECT COUNT(*) FROM \"StaffTask\" WHERE \"assigneeId\" = (SELECT id FROM \"User\" WHERE email = 'cuccung123456789@gmail.com');" >> \$DIAG_FILE 2>&1
            echo "" >> \$DIAG_FILE

            # Copy file to running checkin-app container
            docker cp \$DIAG_FILE checkin-app:/app/public/vps-diag.txt
            docker cp \$DIAG_FILE checkin-app:/tmp/vps-diag.txt
            docker compose exec -T checkin-app chmod 644 /app/public/vps-diag.txt /tmp/vps-diag.txt
            rm -f \$DIAG_FILE
            
            echo "Deployment successful!"

